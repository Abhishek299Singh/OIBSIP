<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful, minimal, and responsive To-Do List application to manage your pending and completed tasks efficiently.">
    <title>Minimalist To-Do List</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <h1>FlowTask</h1>
            </div>
            <p class="subtitle">Keep track of your daily intentions</p>
        </header>

        <main>
            <!-- Task Input Form -->
            <form id="todo-form" class="input-container">
                <input 
                    type="text" 
                    id="todo-input" 
                    placeholder="Add a new task..." 
                    autocomplete="off" 
                    required 
                    aria-label="Task content"
                >
                <button type="submit" id="add-btn" aria-label="Add Task">
                    <i class="fa-solid fa-plus"></i>
                    <span>Add Task</span>
                </button>
            </form>

            <!-- Pending Tasks Section -->
            <section class="task-section" aria-labelledby="pending-heading">
                <div class="section-header">
                    <h2 id="pending-heading">Pending Tasks</h2>
                    <span class="task-count" id="pending-count">0</span>
                </div>
                <div class="empty-state" id="pending-empty">
                    <i class="fa-regular fa-clipboard"></i>
                    <p>All caught up! Time to relax or add a task.</p>
                </div>
                <ul class="task-list" id="pending-list">
                    <!-- Tasks will be injected here dynamically -->
                </ul>
            </section>

            <!-- Completed Tasks Section -->
            <section class="task-section" aria-labelledby="completed-heading">
                <div class="section-header">
                    <h2 id="completed-heading">Completed Tasks</h2>
                    <span class="task-count completed" id="completed-count">0</span>
                </div>
                <div class="empty-state" id="completed-empty">
                    <i class="fa-regular fa-circle-check"></i>
                    <p>No completed tasks yet. Keep moving forward!</p>
                </div>
                <ul class="task-list completed-list" id="completed-list">
                    <!-- Completed tasks will be injected here dynamically -->
                </ul>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 FlowTask. Designed for clarity.</p>
        </footer>
    </div>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
