<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure and responsive Login Authentication System with Local Storage user management.">
    <title>Sign In | FlowAuth</title>
    <!-- Google Fonts: Space Grotesk & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for UI icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Shared Styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Identity Services client script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Immediate Route Guard to prevent logged-in users from seeing login page -->
    <script>
        if (localStorage.getItem('oibsip_session')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</head>
<body>
    <!-- Background Glow Blobs -->
    <div class="bg-glow blob-1"></div>
    <div class="bg-glow blob-2"></div>

    <div class="auth-container">
        <!-- Logo and Brand Area -->
        <header class="auth-header">
            <div class="brand-logo">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Sign in to access your secure dashboard</p>
        </header>

        <!-- Notification Banner -->
        <div id="notification-banner" class="notification hidden" role="alert">
            <span class="notification-message"></span>
            <button class="notification-close" id="close-notification" aria-label="Close notification">&times;</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form" novalidate>
            <!-- Email Input Group -->
            <div class="input-group">
                <label for="login-email">Email Address</label>
                <div class="input-field-wrapper">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input 
                        type="email" 
                        id="login-email" 
                        placeholder="you@example.com" 
                        required
                        autocomplete="email"
                    >
                </div>
                <span class="error-msg" id="email-error">Please enter a valid email address</span>
            </div>

            <!-- Password Input Group -->
            <div class="input-group">
                <div class="label-wrapper">
                    <label for="login-password">Password</label>
                </div>
                <div class="input-field-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input 
                        type="password" 
                        id="login-password" 
                        placeholder="••••••••" 
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="Toggle password visibility">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <span class="error-msg" id="password-error">Password is required</span>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn" id="login-submit-btn">
                <span>Sign In</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <!-- Social Divider -->
        <div class="auth-divider">
            <span>or</span>
        </div>

        <!-- Google OAuth Button -->
        <div class="google-auth-wrapper">
            <div id="google-signin-btn"></div>
            <!-- Mock Google Button (renders when client ID is placeholder) -->
            <button type="button" id="mock-google-signin-btn" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="google-logo">
                <span>Continue with Google</span>
            </button>
        </div>

        <!-- Redirect Link -->
        <footer class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Create one here</a></p>
        </footer>
    </div>

    <!-- Mock Google Account Selector Modal -->
    <div id="mock-google-modal" class="modal-overlay hidden">
        <div class="google-modal-card">
            <header class="google-modal-header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="modal-google-logo">
                <h2>Sign in with Google</h2>
                <p>to continue to <strong>FlowAuth</strong></p>
            </header>
            <div class="google-accounts-list">
                <button class="google-account-item" data-email="abhishek.singh@gmail.com" data-name="Abhishek Singh" data-pic="https://lh3.googleusercontent.com/a/default-user=s96-c">
                    <div class="account-avatar">AS</div>
                    <div class="account-info">
                        <span class="account-name">Abhishek Singh</span>
                        <span class="account-email">abhishek.singh@gmail.com</span>
                    </div>
                </button>
                <button class="google-account-item" data-email="jane.doe@gmail.com" data-name="Jane Doe" data-pic="https://lh3.googleusercontent.com/a/default-user=s96-c">
                    <div class="account-avatar jane">JD</div>
                    <div class="account-info">
                        <span class="account-name">Jane Doe</span>
                        <span class="account-email">jane.doe@gmail.com</span>
                    </div>
                </button>
                <button class="google-account-item" data-email="guest.developer@gmail.com" data-name="Guest Developer" data-pic="https://lh3.googleusercontent.com/a/default-user=s96-c">
                    <div class="account-avatar guest">GD</div>
                    <div class="account-info">
                        <span class="account-name">Guest Developer</span>
                        <span class="account-email">guest.developer@gmail.com</span>
                    </div>
                </button>
            </div>
            <button id="cancel-google-btn" class="cancel-modal-btn">Cancel</button>
        </div>
    </div>

    <!-- Core Script -->
    <script src="script.js"></script>
</body>
</html>
